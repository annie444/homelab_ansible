      - description: A custom module plugin for Ansible.
        name: sample_module
        namespace: ""
    objects:
      role:
        - description: Install all requirements of this collection
          name: common
          namespace:
    plugins:
      filter:
        - description: A custom filter plugin for Ansible.
          name: sample_filter
          namespace:
      lookup:
        - description: A custom lookup plugin for Ansible.
          name: sample_lookup
          namespace:
      test:
        - description: A custom test plugin for Ansible.
          name: sample_test
          namespace:
