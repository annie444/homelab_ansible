fail_fast = false


[[repos]]
repo = "https://github.com/ansible-network/collection_prep"
rev = "1.1.2"
hooks = [{ id = "update-docs" }]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "check-merge-conflict" },
  { id = "check-symlinks" },
  { id = "debug-statements" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "https://github.com/asottile/add-trailing-comma"
rev = "v4.0.0"
hooks = [{ id = "add-trailing-comma" }]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-prettier"
rev = "v4.0.0-alpha.8"
hooks = [
  { id = "prettier", entry = 'env CI=1 bash -c "prettier --list-different . || ec=$? && prettier --loglevel=error --write . && exit $ec"', pass_filenames = false, args = [
  ], additional_dependencies = [
    "prettier",
    "prettier-plugin-toml",
  ] },
]

[[repos]]
repo = "https://github.com/PyCQA/isort"
rev = "8.0.1"
hooks = [{ id = "isort", args = ["--filter-files"] }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.5"
hooks = [{ id = "ruff-check", args = ["--fix"] }, { id = "ruff-format" }]
