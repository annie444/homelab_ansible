---
- name: Converge
  hosts: molecule
  gather_facts: true
  become: true
  become_user: root
  vars:
    ns_re_search: "\\b(((\\d{1,3}\\.){3}(\\d{1,3}))|(([a-f0-9]{4}:)+(:?[a-f0-9]{1,4})))\\b"
    continue_str: " \\"
  tasks:
    - name: Set up the temp dir
      ansible.builtin.file:
        path: /tmp/ansible
        owner: root
        group: root
        mode: "0777"
        state: directory

    - name: Check uname
      ansible.builtin.raw: uname -a
      register: result
      changed_when: false

    - name: Print some info
      ansible.builtin.debug:
        var: result.stdout

    - name: Restart systemd resolved
      ansible.builtin.systemd_service:
        name: systemd-resolved
        state: restarted
        enabled: true

    - name: Get current resolv.conf contents
      ansible.builtin.slurp:
        path: /etc/resolv.conf
      register: orig_resolve_conf

    - name: Extract the nameservers from the resolve config
      ansible.builtin.set_fact:
        resolv_nameservers: >-
          {%- set dns = namespace(ns=[]) -%}
          {%- set resolv_content = orig_resolve_conf.content | ansible.builtin.b64decode -%}
          {%- set ns_list = resolv_content | ansible.builtin.regex_findall(ns_re_search, ignorecase=True, multiline=True) -%}
          {%- for match in ns_list -%}
          {%-   if match is iterable and match is not string -%}
          {%-     set dns.ns = dns.ns | default([]) + [match[0]] -%}
          {%-   endif -%}
          {%- endfor -%}
          {{ dns.ns }}

    - name: Set DNS servers
      ansible.builtin.shell: |
        {%- set ns_len = resolv_nameservers | length -%}
        resolvectl dns eth0 \
        1.1.1.1 \
        1.0.0.1 \
        2606:4700:4700::1111 \
        2606:4700:4700::1001{{ (ns_len > 0) | ansible.builtin.ternary(continue_str, '') }}
        {% for ns in resolv_nameservers %}
        {{ ns ~ ((loop.last) | ansible.builtin.ternary('', continue_str)) }}
        {% endfor %}
      args:
        executable: /bin/bash
      register: resolvectl_set_dns
      changed_when: resolvectl_set_dns.rc == 0
      failed_when: resolvectl_set_dns.rc != 0

    - name: Load the default vars
      ansible.builtin.include_vars:
        file: ../../default/vars/vars.yml

    - name: Set the test name
      ansible.builtin.set_fact:
        test_name: "{{ molecule_scenario_name | replace('integration_', '') }}"

    - name: Set the test path
      ansible.builtin.set_fact:
        test_path: "{{ integration_tests_path }}{{ test_name }}"

    - name: Check for default vars
      ansible.builtin.stat:
        path: "{{ test_path }}/defaults/main.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: converge_default_vars

    - name: Load the role's default vars
      when: converge_default_vars.stat.exists
      ansible.builtin.include_vars:
        file: "{{ test_path }}/defaults/main.yml"

    - name: Check for extra vars
      ansible.builtin.stat:
        path: "{{ test_path }}/vars/main.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: converge_extra_vars

    - name: Load the role's extra vars
      when: converge_extra_vars.stat.exists
      ansible.builtin.include_vars:
        file: "{{ test_path }}/vars/main.yml"

    - name: Check for test vars
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/vars.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: vars_test

    - name: Set the test vars
      when: vars_test.stat.exists
      ansible.builtin.include_vars:
        file: "{{ test_path }}/tests/vars.yml"

    - name: "Check test vars for {{ integration_flavor }}"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/vars-{{ integration_flavor }}.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: vars_test

    - name: "Set test vars for {{ integration_flavor }}"
      when: vars_test.stat.exists
      ansible.builtin.include_vars:
        file: "{{ test_path }}/tests/vars-{{ integration_flavor }}.yml"

    - name: "Check test vars for {{ integration_subset }}"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/vars-{{ integration_subset }}.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: vars_test

    - name: "Set test vars for {{ integration_subset }}"
      when: vars_test.stat.exists
      ansible.builtin.include_vars:
        file: "{{ test_path }}/tests/vars-{{ integration_subset }}.yml"

    - name: Check for setup files
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/setup.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: setup_test

    - name: Set up integration tests
      when: setup_test.stat.exists
      ansible.builtin.include_tasks: "{{ test_path }}/tests/setup.yml"

    - name: "Check setup files for {{ integration_flavor }}"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/setup-{{ integration_flavor }}.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: setup_test

    - name: "Set up integration tests for {{ integration_flavor }}"
      when: setup_test.stat.exists
      ansible.builtin.include_tasks: "{{ test_path }}/tests/setup-{{ integration_flavor }}.yml"

    - name: "Check setup files for {{ integration_subset }}"
      delegate_to: localhost
      become: false
      ansible.builtin.stat:
        path: "{{ test_path }}/tests/setup-{{ integration_subset }}.yml"
        get_mime: false
        get_checksum: false
        get_attributes: false
        follow: true
      register: setup_test

    - name: "Set up integration tests for {{ integration_subset }}"
      when: setup_test.stat.exists
      ansible.builtin.include_tasks: "{{ test_path }}/tests/setup-{{ integration_subset }}.yml"

    - name: "Integration test: {{ test_name }}"
      ansible.builtin.include_role:
        name: "{{ test_path }}"
