---
name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Upload releases
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          cache-suffix: "release"

      - name: Install python dependencies
        run: |
          uv sync --locked --all-extras --dev
        shell: bash

      - name: Build the collection
        shell: bash
        run: |
          uv run ansible-galaxy collection build -v --force

      - name: Get the collection file
        id: collection
        shell: bash
        run: |
          TARBALL=$(ls -1 ./*.tar.gz)
          echo "tarball=$TARBALL" >>$GITHUB_OUTPUT

      - name: Publish the collection on Galaxy
        shell: bash
        run: |
          uv run ansible-galaxy collection publish \
            "${{ steps.collection.outputs.tarball }}" \
          --api-key "${{ secrets.ANSIBLE_GALAXY_API_KEY }}"

