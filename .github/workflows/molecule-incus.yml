---
name: Molecule Incus Matrix

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      os_variant:
        description: OS variant to test (fedora42 or fedora43)
        required: false
        default: ""
      scenario:
        description: Molecule scenario name (common)
        required: false
        default: ""
  schedule:
    - cron: "0 3 * * *"

jobs:
  determine-matrix:
    name: Determine test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute matrix payload
        id: set-matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.os_variant }}" && -n "${{ github.event.inputs.scenario }}" ]]; then
            matrix='{"include":[{"os_variant":"${{ github.event.inputs.os_variant }}","scenario":"${{ github.event.inputs.scenario }}"}]}'
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            matrix='{"include":[{"os_variant":"fedora42","scenario":"common"},{"os_variant":"fedora43","scenario":"common"}]}'
          else
            matrix="$(scripts/determine_changed_roles.sh)"
          fi

          if [[ "$(jq -r '.include | length' <<<"${matrix}")" -eq 0 ]]; then
            matrix='{"include":[{"os_variant":"fedora42","scenario":"common"},{"os_variant":"fedora43","scenario":"common"}]}'
          fi

          echo "${matrix}" > matrix.json
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-json
          path: matrix.json

  comment-matrix:
    name: Comment test plan
    runs-on: ubuntu-latest
    needs: determine-matrix
    if: github.event_name == 'pull_request'
    outputs:
      comment-id: ${{ steps.comment.outputs.comment-id }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: matrix-json
          path: .

      - name: Render matrix summary
        id: render
        shell: bash
        env:
          MATRIX: ${{ needs.determine-matrix.outputs.matrix }}
        run: |
          python - <<'PY'
import json
import os
matrix = json.loads(os.environ["MATRIX"])
repo = os.environ["GITHUB_REPOSITORY"]
run_id = os.environ["GITHUB_RUN_ID"]
lines = []
for entry in matrix["include"]:
    link = f"https://github.com/{repo}/actions/runs/{run_id}?check_suite_focus=true"
    lines.append(f"- [{entry['os_variant']}/{entry['scenario']}]({link}) ⚙️ pending")
with open("links.md", "w", encoding="utf-8") as handle:
    handle.write("\n".join(lines))
PY
          {
            echo 'links<<EOF'
            cat links.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR comment
        id: comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🧪 **Molecule Test Matrix for this PR**

            ```
            ${{ needs.determine-matrix.outputs.matrix }}
            ```
            Each entry = `{ os_variant, scenario }`

            👉 **Live results**
            ${{ steps.render.outputs.links }}

  molecule:
    name: Run Molecule
    needs: determine-matrix
    runs-on: [self-hosted, linux, incus-runner]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tox and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
          pip install -r test-requirements.txt

      - name: Run tox for ${{ matrix.os_variant }}-${{ matrix.scenario }}
        id: runtests
        shell: bash
        run: |
          set +e
          tox -e "${{ matrix.os_variant }}-${{ matrix.scenario }}"
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          mkdir -p results
          echo "${{ matrix.os_variant }},${{ matrix.scenario }},${exit_code}" > "results/${{ matrix.os_variant }}-${{ matrix.scenario }}.csv"
          exit 0

      - name: Upload scenario result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os_variant }}-${{ matrix.scenario }}
          path: results/${{ matrix.os_variant }}-${{ matrix.scenario }}.csv

      - name: Fail if tox failed
        if: steps.runtests.outputs.exit_code != '0'
        run: exit 1

  update-status:
    name: Update PR status
    runs-on: ubuntu-latest
    needs:
      - molecule
      - comment-matrix
    if: always() && github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: aggregated-results
          merge-multiple: true

      - name: Aggregate results
        id: aggregate
        shell: bash
        run: |
          python - <<'PY'
import csv
import json
from pathlib import Path
results_dir = Path("aggregated-results")
rows = []
for path in results_dir.glob("*.csv"):
    with path.open() as fh:
        reader = csv.reader(fh)
        for os_variant, scenario, code in reader:
            rows.append({"os": os_variant, "scenario": scenario, "code": int(code)})
rows.sort(key=lambda entry: (entry["scenario"], entry["os"]))
lines = []
failures = 0
for entry in rows:
    status = "✅" if entry["code"] == 0 else "❌"
    if entry["code"] != 0:
        failures += 1
    lines.append(f"- **{entry['os']}/{entry['scenario']}** {status}")
summary = "\n".join(lines) if lines else "_No scenario results were uploaded._"
from pathlib import Path
Path("summary.md").write_text(summary, encoding="utf-8")
Path("aggregate.json").write_text(
    json.dumps({"summary": summary, "failures": failures, "total": len(rows)}),
    encoding="utf-8",
)
PY
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          cat summary.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          failures=$(jq -r '.failures' aggregate.json)
          total=$(jq -r '.total' aggregate.json)
          echo "failures=${failures}" >> "$GITHUB_OUTPUT"
          echo "total=${total}" >> "$GITHUB_OUTPUT"

      - name: Update PR comment with final results
        if: needs.comment-matrix.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ needs.comment-matrix.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🧪 **Final Molecule Results**
            ${{ steps.aggregate.outputs.summary }}

      - name: Update PR body badge
        uses: actions/github-script@v7
        env:
          FAILURES: ${{ steps.aggregate.outputs.failures }}
          TOTAL: ${{ steps.aggregate.outputs.total }}
        with:
          script: |
            const failures = parseInt(process.env.FAILURES || '0', 10);
            const total = parseInt(process.env.TOTAL || '0', 10);
            const start = '<!-- MOLECULE_BADGE_START -->';
            const end = '<!-- MOLECULE_BADGE_END -->';
            let badgeText;
            let summary;
            if (total === 0) {
              badgeText = '![Molecule Tests](https://img.shields.io/badge/Molecule%20Tests-no%20runs-lightgrey?style=for-the-badge)';
              summary = 'ℹ️ No Molecule jobs reported results.';
            } else if (failures === 0) {
              badgeText = '![Molecule Tests](https://img.shields.io/badge/Molecule%20Tests-passing-brightgreen?style=for-the-badge)';
              summary = `✅ All ${total} Molecule jobs passed.`;
            } else {
              badgeText = '![Molecule Tests](https://img.shields.io/badge/Molecule%20Tests-failing-red?style=for-the-badge)';
              summary = `❌ ${failures} of ${total} Molecule jobs failed.`;
            }
            const block = `${start}\n${badgeText}\n\n${summary}\n${end}`;
            const body = context.payload.pull_request.body || '';
            const regex = new RegExp(`${start}[\\s\\S]*?${end}`);
            const newBody = body.includes(start) ? body.replace(regex, block) : `${block}\n\n${body}`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody,
            });
