---
name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    name: Requires changelog
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-changelog')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "changelog"

      - name: Install python dependencies
        run: |
          uv sync --locked --only-group changelog
        shell: bash

      - name: Validate changelog
        run: |
          uv run antsibull-changelog lint
        shell: bash

  build-import:
    name: Build and Import
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "build"

      - name: Install python dependencies
        run: |
          uv sync --locked --only-group build
        shell: bash

      - name: Update galaxy-importer cfg
        shell: bash
        run: |
          echo -e "[galaxy-importer]\nCHECK_REQUIRED_TAGS=True" > /tmp/galaxy-importer.cfg
          export GALAXY_IMPORTER_CONFIG=/tmp/galaxy-importer.cfg

      - name: Build the collection tarball and run galaxy importer on it
        shell: bash
        run: |
          uv run -m galaxy_importer.main --git-clone-path . --output-path /tmp
        env:
          GALAXY_IMPORTER_CONFIG: /tmp/galaxy-importer.cfg

  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "lint"

      - name: Install python dependencies
        run: |
          uv sync --locked --only-group lint
        shell: bash

      - name: Run ansible-lint
        shell: bash
        run: |
          uv run ansible-lint

  tox-matrix:
    name: Get Tox Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      integration-matrix: ${{ steps.integration-matrix.outputs.envlist }}
      sanity-matrix: ${{ steps.sanity-matrix.outputs.envlist }}
      unit-matrix: ${{ steps.unit-matrix.outputs.envlist }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "matrix"

      - name: Install python dependencies
        run: |
          uv sync --locked --only-group matrix
        shell: bash

      - name: Install Podman
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: podman
          version: "matrix-1.0"

      - name: Generate sanity matrix
        id: sanity-matrix
        run: >
          uv run -m tox --ansible --gh-matrix --matrix-scope sanity --conf tox-ansible.ini

      - name: Generate unit matrix
        id: unit-matrix
        run: >
          uv run -m tox --ansible --gh-matrix --matrix-scope unit --conf tox-ansible.ini

      - name: Generate integration matrix
        id: integration-matrix
        run: >
          uv run -m tox --ansible --gh-matrix --matrix-scope integration --conf tox-ansible.ini

  sanity:
    name: Run tox sanity tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - tox-matrix
    strategy:
      fail-fast: false
      matrix:
        tox: ${{ fromJSON(needs.tox-matrix.outputs.sanity-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Tox python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.tox.python }}"
          cache: pip

      - name: Install Podman
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: podman
          version: "tests-1.0"

      - name: Install Python dependencies
        run: |
          pip install -r test-requirements.txt

      - name: Install build toolchain and openssl headers on Linux
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: ${{ matrix.tox.python >= 3.12 }}
        with:
          packages: build-essential libssl-dev libssh-dev
          version: "deps-1.0"

      - name: Run tox unit tests
        run: >-
          tox --ansible -e ${{ matrix.tox.name }} --conf tox-ansible.ini

  unit:
    name: Run tox unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - tox-matrix
    strategy:
      fail-fast: false
      matrix:
        tox: ${{ fromJSON(needs.tox-matrix.outputs.unit-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.tox.python }}"
          cache: pip

      - name: Install Podman
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: podman
          version: "tests-1.0"

      - name: Install Python dependencies
        run: |
          pip install -r test-requirements.txt

      - name: Install build toolchain and openssl headers on Linux
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: ${{ matrix.tox.python >= 3.12 }}
        with:
          packages: build-essential libssl-dev libssh-dev
          version: "deps-1.0"

      - name: Run tox unit tests
        run: >-
          tox --ansible -e ${{ matrix.tox.name }} --conf tox-ansible.ini

  integration:
    name: Run tox integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - tox-matrix
    environment:
      name: rhel
    strategy:
      fail-fast: false
      matrix:
        tox: ${{ fromJSON(needs.tox-matrix.outputs.integration-matrix) }}
    permissions:
      packages: write
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ matrix.tox.python }}"
          cache: pip

      - name: Install Podman
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: podman
          version: "tests-1.0"

      - name: Install Python dependencies
        run: |
          pip install -r test-requirements.txt

      - name: Install build toolchain and openssl headers on Linux
        uses: awalsh128/cache-apt-pkgs-action@latest
        if: ${{ matrix.tox.python >= 3.12 }}
        with:
          packages: build-essential libssl-dev libssh-dev
          version: "deps-1.0"

      - name: Run tox integration tests
        run: >-
          tox --ansible -e ${{ matrix.tox.name }} --conf tox-ansible.ini -- -vvv
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          GHCR_USERNAME: "${{ github.actor }}"
          GHCR_PASSWORD: "${{ secrets.GITHUB_TOKEN }}"
          RHEL_USER: "${{ secrets.RHEL_USERNAME }}"
          RHEL_PASS: "${{ secrets.RHEL_PASSWORD }}"
          CI: "true"

  all-green:
    if: always()
    needs:
      - build-import
      - ansible-lint
      - sanity
      - unit
      - integration
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
