---
name: Containers

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - extensions/ee/**
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened
  push:
    branches:
      - main
    paths:
      - extensions/ee/**
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build all containers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    env:
      REGISTRY: ghcr.io
      REGISTRY_IMAGE: ${{ github.actor }}/ansible-execution-env-${{ matrix.environment }}
    strategy:
      fail-fast: false
      matrix:
        environment:
          - fedora-41
          - fedora-42
          - rhel-10
          - rhel-9
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: "ee"

      - name: Install python dependencies
        run: |
          uv sync --locked --only-group ee
        shell: bash

      - name: Create the context
        working-directory: extensions/ee/${{ matrix.environment }}
        shell: bash
        run: |
          uv run ansible-builder create --file execution-environment.yml \
            --output-filename Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build Docker Container
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./extensions/ee/${{ matrix.environment }}/context
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          sbom: true
