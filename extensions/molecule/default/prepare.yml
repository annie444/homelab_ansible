---
- name: Prepare Fedora base image
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Ensure DNF metadata is available
      ansible.builtin.command: dnf -y makecache
      changed_when: false

    - name: Install base packages
      ansible.builtin.package:
        name:
          - python3
          - sudo
          - openssh-clients
          - procps-ng
        state: present

    - name: Enable lingering for root to keep user services available
      ansible.builtin.command: loginctl enable-linger root
      changed_when: false
      failed_when: false
