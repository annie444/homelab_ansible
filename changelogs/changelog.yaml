  1.0.1:
    changes:
      release_summary: Fix the journald system role inclusion
      bugfixes:
        - Remove all instances of `| default(undef())`, as these don't actually undefine the variable, but rather make it so the test `var is defined` fail.
    release_date: "2026-03-14"
