---
- name: Create container instances
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Load the default vars
      ansible.builtin.include_vars:
        file: ../../default/vars/vars.yml

    - name: Build network list for molecule hosts
      ansible.builtin.set_fact:
        molecule_networks: "{{ (molecule_networks | default([])) + [network_name] | unique }}"
      vars:
        network_prefix: "{{ hostvars[item].container_network | default(item) }}"
        network_name: "{{ network_prefix }}-{{ molecule_scenario_name }}"
      loop: "{{ groups['molecule'] }}"
      loop_control:
        label: "{{ network_name }}"

    - name: Ensure podman networks exist
      containers.podman.podman_network:
        name: "{{ item }}"
        ipv6: true
        disable_dns: false
        dns:
          - 1.1.1.1
          - 1.0.0.1
          - 2606:4700:4700::1111
          - 2606:4700:4700::1001
        internal: false
        state: present
      loop: "{{ molecule_networks }}"

    - name: Create containers from inventory
      containers.podman.podman_container:
        hostname: "{{ item }}"
        name: "{{ item }}"
        image: "{{ hostvars[item]['container_image'] }}"
        command: "{{ hostvars[item]['container_command'] | default('sleep 1d') }}"
        entrypoint: "{{ hostvars[item]['container_entrypoint'] | default(omit) }}"
        privileged: "{{ hostvars[item]['container_privileged'] | default(false) }}"
        volumes: "{{ hostvars[item]['container_volumes'] | default(omit) }}"
        cap_add: "{{ hostvars[item]['container_capabilities'] | default(omit) }}"
        systemd: "{{ hostvars[item]['container_systemd'] | default(false) }}"
        log_driver: "{{ hostvars[item]['container_log_driver'] | default('json-file') }}"
        env:
          container: podman
        network: "{{ (hostvars[item].container_network | default(item)) }}-{{ molecule_scenario_name }}"
        dns:
          - 1.1.1.1
          - 1.0.0.1
          - 2606:4700:4700::1111
          - 2606:4700:4700::1001
        state: started
      register: result
      loop: "{{ groups['molecule'] }}"

    - name: Verify containers are running
      ansible.builtin.include_tasks:
        file: tasks/create-fail.yml
      when: >
        item.container.State.ExitCode != 0 or
        not item.container.State.Running
      loop: "{{ result.results }}"
      loop_control:
        label: "{{ item.container.Name }}"

    - name: Wait for containers to be ready
      ansible.builtin.wait_for_connection:
        timeout: 30
      delegate_to: "{{ item }}"
      loop: "{{ groups['molecule'] }}"
